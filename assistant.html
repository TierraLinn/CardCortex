<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI Assistant | CardCortex</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./app-icon.svg" type="image/svg+xml" />
    <meta name="theme-color" content="#050713" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CardCortex" />
    <link rel="stylesheet" href="./styles.css?v=workflow1" />
  </head>
  <body data-page="assistant">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html"><span class="brand-glyph" aria-hidden="true"></span><span>CardCortex</span></a>
        <nav aria-label="Primary navigation">
          <a href="./vault.html">Vault</a><a href="./scanner.html">Scanner</a><a href="./pricing.html">Values</a><a href="./grading.html">AI grading</a><a href="./marketplace.html">Sell</a><a href="./auth.html">Account</a>
        </nav>
        <a class="nav-cta" href="./scanner.html">Scan a card</a>
      </header>
      <main class="app-page assistant-page">
        <section class="page-heading">
          <div>
            <h1>CardCortex AI advisor</h1>
            <p>Ask about grading, values, selling strategy, storage, insurance records, or what to scan next.</p>
          </div>
        </section>
        <section class="chat-shell">
          <div class="prompt-rail" aria-label="Suggested AI prompts">
            <button type="button">Which cards should I grade first?</button>
            <button type="button">What should I sell now?</button>
            <button type="button">How do I organize my vault?</button>
            <button type="button">Create an insurance report plan.</button>
          </div>
          <div id="chatLog" class="chat-log"></div>
          <form id="chatForm" class="chat-form">
            <input id="chatInput" type="text" placeholder="Ask CardCortex what to do with your cards..." />
            <button class="primary-button" type="submit">Ask</button>
          </form>
        </section>
      </main>
    </div>
    <script src="./data.js"></script>
    <script type="module" src="./brand3d.js?v=workflow1"></script>
    <script type="module" src="./page3d.js?v=workflow1"></script>
    <script src="./app.js?v=workflow1"></script>
  </body>
</html>
