<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Account | CardCortex</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="auth">
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html"><span class="brand-glyph">CC</span><span>CardCortex</span></a>
        <nav aria-label="Primary navigation">
          <a href="./vault.html">Vault</a><a href="./scanner.html">Scanner</a><a href="./pricing.html">Values</a><a href="./grading.html">AI grading</a><a href="./marketplace.html">Sell</a>
        </nav>
        <a class="nav-cta" href="./scanner.html">Scan a card</a>
      </header>
      <main class="app-page auth-page">
        <section class="page-heading">
          <div>
            <h1>Collector account</h1>
            <p>Sign in to save real cards, uploaded images, storage locations, values, and AI grading notes to your CardCortex vault.</p>
          </div>
        </section>
        <section class="auth-grid">
          <form id="authForm" class="auth-card">
            <h2>Sign in or create account</h2>
            <label>
              Email
              <input id="authEmail" type="email" autocomplete="email" required />
            </label>
            <label>
              Password
              <input id="authPassword" type="password" autocomplete="current-password" required minlength="6" />
            </label>
            <div class="auth-actions">
              <button class="primary-button" type="submit" data-mode="signin">Sign in</button>
              <button class="secondary-button" type="button" id="signUpButton">Create account</button>
            </div>
            <p id="authStatus" role="status" aria-live="polite">Waiting for sign in.</p>
          </form>
          <article class="auth-card">
            <h2>Current session</h2>
            <p id="sessionStatus">Checking session...</p>
            <button id="signOutButton" class="secondary-button" type="button">Sign out</button>
          </article>
        </section>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="./supabase-config.js"></script>
    <script src="./supabase-client.js"></script>
    <script type="module" src="./page3d.js"></script>
    <script src="./auth.js"></script>
  </body>
</html>
